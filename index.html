
<!DOCTYPE html>
<html lang="it">
  <!-- Versione vecchia ma funzionante -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner BDBCF</title>

  <!-- ✅ SCRIPT CORRETTI -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #111;
      color: #fff;
      text-align: center;
    }

    video {
      width: 100%;
      background: black;
    }

    .container {
      position: relative;
    }

    .scan-box {
      position: absolute;
      left: 15%;
      top: 30%;
      width: 70%;
      height: 25%;
      border: 2px dashed #00d2ff;
      border-radius: 10px;
    }

    /* ✅ linea rossa */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 2px;
      background: red;
      animation: scan 1.5s infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    button {
      width: 90%;
      padding: 12px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: #00d2ff;
    }

    #status {
      margin-top: 8px;
    }
  </style>
</head>

<body>

<h2>📷 Scanner BDBCF</h2>

<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <div class="scan-box">
    <div class="scan-line"></div>
  </div>
</div>

<button onclick="toggleCamera()">📸 Camera</button>
<button onclick="toggleFlash()">🔦 Flash</button>

<p id="status">🟡 Pronto</p>

<script>
const video = document.getElementById("video");

let stream = null;
let track = null;
let flashOn = false;

// ================= CAMERA =================
async function toggleCamera() {
  try {

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      setStatus("⏹️ Camera spenta");
      return;
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });

    video.srcObject = stream;
    await video.play();

    track = stream.getVideoTracks()[0];

    setStatus("✅ Camera attiva");

  } catch (err) {
    console.error(err);
    alert("Errore camera: " + err.message);
  }
}

// ================= FLASH =================
async function toggleFlash() {

  if (!track) return;

  try {
    const capabilities = track.getCapabilities();

    if (!capabilities.torch) {
      setStatus("⚠️ Flash non supportato");
      return;
    }

    flashOn = !flashOn;

    await track.applyConstraints({
      advanced: [{ torch: flashOn }]
    });

    setStatus(flashOn ? "🔦 Flash ON" : "🔦 Flash OFF");

  } catch (e) {
    setStatus("❌ Errore flash");
  }
}

// ================= UI =================
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}
</script>

</body>
</html>
