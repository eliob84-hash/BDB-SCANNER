<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Seriali OCR</title>

<!-- ✅ LIBRERIE (TUTTE CORRETTE) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
  --bg:#0b0f14; --card:#121821; --accent:#00e676;
  --warn:#ff9800; --danger:#ff5252;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:linear-gradient(180deg,#0b0f14,#0e1420);
  color:#fff;padding:12px
}
h1{margin:0 0 6px 0;font-size:20px}

.card{background:var(--card);border-radius:14px;padding:10px}

.inputs{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:8px
}
input{
  padding:10px;border-radius:10px;border:none;font-weight:600
}

.status{
  display:flex;align-items:center;gap:8px;
  font-weight:700;margin-bottom:6px
}
.led{
  width:12px;height:12px;border-radius:50%;
  background:#f44336
}
.led.on{background:#00e676}

.scanner{position:relative;border-radius:12px;overflow:hidden}
video{width:100%;display:block}

.overlay{
  position:absolute;inset:0;pointer-events:none
}
.overlay::before{
  content:"";position:absolute;inset:18% 12%;
  border:2px dashed rgba(0,230,118,.7)
}
.scan-line{
  position:absolute;left:12%;right:12%;
  height:3px;background:#ff3b3b;
  animation:scan 2.2s linear infinite
}
@keyframes scan{
  0%{top:18%}50%{top:82%}100%{top:18%}
}

.controls{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:8px;margin:10px 0
}
button{
  border:none;border-radius:12px;
  padding:10px;font-weight:700;
  display:flex;gap:6px;align-items:center;justify-content:center
}
button.alt{background:#455a64;color:#fff}
button.ok{background:var(--accent);color:#0b0f14}
button.danger{background:var(--danger);color:#fff}

button svg{width:18px;height:18px;fill:currentColor}

table{width:100%;background:#fff;color:#000;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center}

.thumb{
  width:140px;
  background:#fff;
  padding:6px 16px;
  border:2px solid #eee;
  border-radius:0;
  cursor:zoom-in
}
.serial{cursor:pointer;font-weight:700}
.serial.edited{color:var(--warn)}

.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%);
  background:var(--danger);color:#fff;
  padding:10px 16px;border-radius:20px;
  font-weight:700;opacity:0;
  transition:opacity .25s ease;
  z-index:1000
}
.toast.show{opacity:1}

#zoomModal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.9);
  display:none;align-items:center;justify-content:center;
  z-index:999
}
#zoomModal img{max-width:95%;max-height:95%}
#zoomModal button{
  position:absolute;top:20px;right:20px;
  background:#ff5252;color:#fff;
  border:none;padding:10px;border-radius:20px;font-weight:700
}
</style>
</head>

<body>

<h1>Scanner Seriali</h1>

<div class="card">

  <div class="inputs">
    <input id="operator" placeholder="Operatore">
    <input id="lot" placeholder="Lotto / Posizione">
  </div>

  <div class="status">
    <div id="camLed" class="led"></div>
    <span id="camStatus">Camera OFF</span>
  </div>

  <div class="scanner">
    <video id="video" autoplay playsinline></video>
    <div class="overlay"><div class="scan-line"></div></div>
  </div>

  <div class="controls">
    <button class="alt" onclick="toggleCamera()">
      <svg viewBox="0 0 24 24"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/></svg>
      Camera
    </button>
    <button class="alt" onclick="toggleFlash()">
      <svg viewBox="0 0 24 24"><path d="M7 2h10l-4 8h4l-8 12 2-8H7z"/></svg>
      Flash
    </button>
    <button class="ok" onclick="exportExcel()">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM9 8l2 4-2 4h2l1-3 1 3h2l-2-4 2-4h-2l-1 3-1-3z"/></svg>
      Excel
    </button>
    <button class="ok" onclick="exportZip()">
      <svg viewBox="0 0 24 24"><path d="M7 3h7l3 3v15H7zM9 6h2v2H9zm0 4h2v2H9zm0 4h2v2H9z"/></svg>
      ZIP
    </button>
    <button class="ok" onclick="exportAll()">
      <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5zm7-18v10l4-4 1.4 1.4L12 16.8 6.6 9.4 8 8l4 4V2z"/></svg>
      Tutto
    </button>
  </div>

  <table>
    <thead>
      <tr><th>Seriale</th><th>Anteprima</th><th>Azione</th></tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

</div>

<div id="toast" class="toast">Seriale già presente</div>

<div id="zoomModal">
  <button onclick="closeZoom()">Chiudi</button>
  <img id="zoomImg">
</div>

<canvas id="canvas" hidden></canvas>

<script>
const SERIAL_REGEX=/^BDBCF00[0-9A-F]{3}$/;
let stream,track,worker;
let cameraOn=false,flashOn=false,freezeOCR=false;

const found=new Set();
const rows=[];

/* AUDIO + VIBRA */
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=freq;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1200);
}

function setCamStatus(on){
  camLed.classList.toggle("on",on);
  camStatus.textContent=on?"Camera ON":"Camera OFF";
}

/* CAMERA */
async function toggleCamera(){
  if(cameraOn){
    stream.getTracks().forEach(t=>t.stop());
