
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Seriali OCR</title>

<!-- ✅ LIBRERIE: SOLO <script src="..."></script> (verificato) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
  --bg:#0b0f14; --card:#121821; --accent:#00e676; --muted:#9aa4b2;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
  background:linear-gradient(180deg,#0b0f14,#0e1420); color:#fff; padding:12px;
}
header{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px}
h1{font-size:20px; margin:0}

.card{
  background:var(--card); border-radius:14px; padding:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.scanner{position:relative; border-radius:12px; overflow:hidden}
video{width:100%; display:block}

/* Overlay */
.overlay{position:absolute; inset:0; pointer-events:none}
.overlay::before{
  content:""; position:absolute; inset:18% 12%;
  border:2px dashed rgba(0,230,118,.7); border-radius:10px;
}
.scan-line{
  position:absolute; left:12%; right:12%; height:3px; background:#ff3b3b;
  animation:scan 2.2s linear infinite;
}
@keyframes scan{0%{top:18%}50%{top:82%}100%{top:18%}}

.controls{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:10px 0}
button{
  border:none; border-radius:12px; padding:10px; color:#0b0f14;
  background:#e6e9ef; font-weight:700; display:flex; gap:8px;
  align-items:center; justify-content:center;
}
button.alt{background:#455a64; color:#fff}
button.ok{background:var(--accent)}
button:active{transform:scale(.98)}

table{
  width:100%; border-collapse:collapse; background:#fff; color:#000;
  border-radius:12px; overflow:hidden; margin-top:10px;
}
th,td{padding:8px; border-bottom:1px solid #e6e6e6; text-align:center}
th{background:#f2f4f7}
.thumb{width:72px; border-radius:8px}

.footer-note{color:var(--muted); font-size:12px; text-align:center; margin-top:6px}

/* SVG icon size */
svg{width:18px; height:18px}
</style>
</head>

<body>

<header>
  <h1>Scanner Seriali</h1>
</header>

<div class="card">
  <div class="scanner">
    <video id="video" autoplay playsinline></video>
    <div class="overlay"><div class="scan-line"></div></div>
  </div>

  <div class="controls">
    <button class="alt" onclick="toggleCamera()">
      <!-- camera icon -->
      <svg viewBox="0 0 24 24"><path d="M4 7h3l2-2h6l2 2h3v12H4z" fill="currentColor"/></svg>
      Camera
    </button>
    <button class="alt" onclick="toggleFlash()">
      <!-- flash icon -->
      <svg viewBox="0 0 24 24"><path d="M7 2h10l-4 8h4l-8 12 2-8H7z" fill="currentColor"/></svg>
      Flash
    </button>
    <button class="ok" onclick="exportExcel()">
      <!-- excel icon -->
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM9 8l2 4-2 4h2l1-3 1 3h2l-2-4 2-4h-2l-1 3-1-3z" fill="currentColor"/></svg>
      Excel
    </button>
    <button class="ok" onclick="exportZip()">
      <!-- zip icon -->
      <svg viewBox="0 0 24 24"><path d="M7 3h7l3 3v15H7zM9 6h2v2H9zm0 4h2v2H9zm0 4h2v2H9z" fill="currentColor"/></svg>
      ZIP
    </button>
  </div>

  <table>
    <thead>
      <tr><th>Seriale</th><th>Anteprima</th></tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

  <div class="footer-note">
    Riconosce solo pattern <b>BDBCF00XXX</b>. Anteprime ritagliate automaticamente.
  </div>
</div>

<canvas id="canvas" hidden></canvas>

<script>
/* =================== CONFIG =================== */
const SERIAL_REGEX = /^BDBCF00[0-9A-F]{3}$/;
const SCAN_DELAY_MS = 1200;

/* =================== STATE =================== */
let stream=null, track=null, worker=null;
let cameraOn=false, flashOn=false;
const found = new Set();
const rows = []; // { seriale, imgDataURL }

/* =================== FEEDBACK =================== */
const beep = new Audio(
 "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA="
);

/* =================== CAMERA =================== */
async function toggleCamera(){
  if(cameraOn){
    stream.getTracks().forEach(t=>t.stop());
    cameraOn=false; return;
  }
  stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:"environment"} });
  video.srcObject = stream;
  await new Promise(r=>video.onloadedmetadata=r);
  track = stream.getVideoTracks()[0];

  if(!worker){
    worker = await Tesseract.createWorker();
    await worker.loadLanguage("eng");
    await worker.initialize("eng");
  }
  cameraOn=true;
  scanLoop();
}

async function toggleFlash(){
  if(!track || !track.getCapabilities().torch){
    alert("Flash non supportato su questo dispositivo");
    return;
  }
  flashOn=!flashOn;
  await track.applyConstraints({ advanced:[{torch:flashOn}] });
}

/* =================== OCR LOOP =================== */
async function scanLoop(){
  if(!cameraOn) return;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth/2;
  canvas.height = video.videoHeight/2;

  // Pre-processing per plastica bianca / testo scuro
  ctx.filter = "grayscale(100%) contrast(180%) brightness(110%)";
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const { data } = await worker.recognize(canvas);

  for(const w of data.words){
    const t = w.text.replace(/O/g,"0").trim();
    if(!SERIAL_REGEX.test(t) || found.has(t)) continue;

    found.add(t);

    // Crop del SOLO codice
    const {x0,y0,x1,y1} = w.bbox;
    const c = document.createElement("canvas");
    c.width = x1-x0; c.height = y1-y0;
    c.getContext("2d").drawImage(canvas,x0,y0,c.width,c.height,0,0,c.width,c.height);
    const img = c.toDataURL("image/jpeg");

    rows.push({ seriale:t, imgDataURL:img });
    addRow(t,img);

    beep.play();
    navigator.vibrate(200);
  }
  setTimeout(scanLoop, SCAN_DELAY_MS);
}

/* =================== UI =================== */
function addRow(seriale,img){
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${seriale}</td><td><img class="thumb" src="${img}"></td>`;
  results.appendChild(tr);
}

/* =================== EXPORT =================== */
function exportExcel(){
  const ws = XLSX.utils.json_to_sheet(
    rows.map(r=>({ Seriale:r.seriale, Miniatura_Base64:r.imgDataURL }))
  );
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Seriali");
  XLSX.writeFile(wb, "seriali.xlsx");
}

async function exportZip(){
  const zip = new JSZip();
  rows.forEach(r=>{
    const base64 = r.imgDataURL.split(",")[1];
    zip.file(`${r.seriale}.jpg`, base64, {base64:true});
  });
  const blob = await zip.generateAsync({type:"blob"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "anteprime_seriali.zip";
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
