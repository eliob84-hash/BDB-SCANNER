<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner continuo BDBCF</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#111;
  color:#fff;
  text-align:center;
}

video { width:100%; }

.wrapper {
  position:relative;
}

.scan-box {
  position:absolute;
  left:15%;
  top:35%;
  width:70%;
  height:25%;
  border:2px dashed #00d2ff;
}

.scan-line {
  position:absolute;
  height:2px;
  width:100%;
  background:red;
  animation:scan 2s infinite;
}

@keyframes scan {
  0% { top:0 }
  100% { top:100% }
}

button {
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00d2ff;
}

#status { margin-top:10px }

</style>
</head>

<body>

<h2>📷 Scanner continuo</h2>

<div class="wrapper">
  <video id="video" playsinline muted></video>
  <div class="scan-box"><div class="scan-line"></div></div>
</div>

<button onclick="startCamera()">📸 Avvia</button>
<button onclick="stopCamera()">⏹️ Stop</button>

<p id="status">Pronto</p>

<script>
const video = document.getElementById("video");

let stream = null;
let worker = null;
let running = false;

const REGEX = /^BDBCF00[0-9A-F]{3}$/;

// ================= CAMERA =================
async function startCamera(){

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    });

    video.srcObject = stream;
    await video.play();

    document.getElementById("status").textContent = "✅ Camera attiva";

    startScanner();

  } catch(e){
    alert("Errore camera: " + e.message);
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    running = false;
    document.getElementById("status").textContent = "⏹️ Stop";
  }
}

// ================= OCR =================
async function startScanner(){

  running = true;

  if(!worker){
    worker = await Tesseract.createWorker("eng");
  }

  scanLoop();
}

// ================= LOOP =================
async function scanLoop(){

  if(!running) return;

  try{

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const w = video.videoWidth;
    const h = video.videoHeight;

    // ✅ crop centrale
    const cw = w * 0.6;
    const ch = h * 0.3;

    const x = (w - cw)/2;
    const y = (h - ch)/2;

    canvas.width = 600;
    canvas.height = 300;

    ctx.drawImage(video, x, y, cw, ch, 0, 0, 600, 300);

    const { data:{ text } } = await worker.recognize(canvas);

    processText(text);

  } catch(e){
    console.log(e);
  }

  setTimeout(scanLoop, 1200);
}

// ================= PARSE =================
let lastCode = "";

function processText(text){

  let clean = text.toUpperCase()
    .replace(/O/g,"0")
    .replace(/I/g,"1")
    .replace(/[^A-Z0-9]/g,"");

  const matches = clean.match(/BDBCF00[0-9A-F]{3}/g) || [];

  matches.forEach(code => {

    if(!REGEX.test(code)) return;

    // evita ripetizioni immediate
    if(code === lastCode) return;

    lastCode = code;

    onDetected(code);
  });
}

// ================= EVENTO =================
function onDetected(code){

  document.getElementById("status").textContent = "✅ " + code;

  beep();

  if(navigator.vibrate){
    navigator.vibrate(100);
  }
}

// ================= AUDIO =================
function beep(){
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}
</script>

</body>
</html>
