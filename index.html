
<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tjs</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0f0f1a;
  color:#fff;
  text-align:center;
}

video { width:100%; }

.container { position:relative; }

.scan-box {
  position:absolute;
  left:15%;
  top:30%;
  width:70%;
  height:25%;
  border:2px dashed #00d2ff;
}

.scan-line {
  position:absolute;
  width:100%;
  height:2px;
  background:red;
  animation:scan 1.5s infinite;
}

@keyframes scan {
  0%{top:0}
  100%{top:100%}
}

button {
  width:90%;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:1rem;
}

.primary { background:#00d2ff; }
.success { background:#00b894; }
.warning { background:#fdcb6e; color:#000; }

table {
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
  font-size:0.9rem;
}

td,th {
  border-bottom:1px solid #333;
  padding:6px;
}

.thumb {
  width:50px;
  border-radius:6px;
}

</style>
</head>

<body>

<h2>📷 Scanner BDBCF</h2>

<div class="container">
  <video id="video" playsinline muted></video>
  <div class="scan-box">
    <div class="scan-line"></div>
  </div>
</div>

<button class="primary" onclick="toggleCamera()">📸 Camera</button>
<button class="warning" onclick="toggleFlash()">🔦 Flash</button>

<p id="status">🟡 Pronto</p>

<button class="success" onclick="downloadCSV()">📄 CSV</button>
<button class="success" onclick="downloadZIP()">📦 ZIP</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Codice</th>
<th>Ora</th>
<th>Img</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const video = document.getElementById("video");

let stream=null, track=null, flashOn=false;
let worker;
let scanning=false, busy=false;

let votes = new Map();
let data = [];
let id = 1;

const REGEX = /^BDBCF00[0-9A-F]{3}$/;

// ================= CAMERA =================
async function toggleCamera(){

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
    scanning=false;
    setStatus("⏹️ Camera OFF");
    return;
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;
  await video.play();

  track = stream.getVideoTracks()[0];

  worker = await Tesseract.createWorker("eng");

  await worker.setParameters({
    tessedit_char_whitelist: "BDBCF0123456789ABCDEF",
    tessedit_pageseg_mode: 7
  });

  scanning=true;
  loop();

  setStatus("🟢 Attivo");
}

// ================= FLASH =================
async function toggleFlash(){
  if(!track) return;

  const cap = track.getCapabilities();
  if(!cap.torch){
    setStatus("⚠️ Flash non supportato");
    return;
  }

  flashOn=!flashOn;

  await track.applyConstraints({
    advanced:[{torch:flashOn}]
  });

  setStatus(flashOn?"🔦 ON":"🔦 OFF");
}

// ================= LOOP =================
function loop(){
  if(!scanning) return;

  if(!busy) scan();

  setTimeout(loop,700);
}

// ================= SCAN =================
async function scan(){

  busy=true;

  try{
    const canv = preprocess();
    const {data:{text}} = await worker.recognize(canv);
    process(text, canv);
  }catch(e){console.log(e)}

  busy=false;
}

// ================= PREPROCESS =================
function preprocess(){

  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");

  const w=video.videoWidth;
  const h=video.videoHeight;

  const cw=w*0.7;
  const ch=h*0.25;

  const x=(w-cw)/2;
  const y=(h-ch)/2;

  c.width=600;
  c.height=200;

  ctx.drawImage(video,x,y,cw,ch,0,0,600,200);

  let img=ctx.getImageData(0,0,600,200);
  let d=img.data;

  for(let i=0;i<d.length;i+=4){
    let g=(d[i]+d[i+1]+d[i+2])/3;
    let v=g>140?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }

  ctx.putImageData(img,0,0);

  return c;
}

// ================= PROCESS =================
function process(text, canvas){

  let clean=text.toUpperCase()
    .replace(/O/g,"0")
    .replace(/I/g,"1")
    .replace(/[^A-Z0-9]/g,"");

  const matches=clean.match(/BDBCF00[0-9A-F]{3}/g)||[];

  matches.forEach(code=>{

    if(!REGEX.test(code)) return;

    let count=votes.get(code)||0;
    count++;
    votes.set(code,count);

    if(count>=2){
      if(data.some(d=>d.code===code)){
        setStatus("⚠️ Duplicato");
        votes.clear();
        return;
      }

      addData(code, canvas);
      votes.clear();
    }
  });
}

// ================= ADD DATA =================
function addData(code, canvas){

  const time=new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

  const img=canvas.toDataURL("image/jpeg",0.7);

  data.push({
    id:id++,
    code,
    time,
    img
  });

  render();

  setStatus("✅ "+code);
}

// ================= RENDER =================
function render(){

  const tb=document.getElementById("tbody");
  tb.innerHTML="";

  data.slice().reverse().forEach(r=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${r.id}</td>
      <td>${r.code}</td>
      <td>${r.time}</td>
      <td><img src="${r.img}" class="======== CSV =================
function downloadCSV(){

  let csv="Codice,Ora\n";

  data.forEach(r=>{
    csv+=`${r.code},${r.time}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="codici.csv";
  a.click();
}

// ================= ZIP =================
async function downloadZIP(){

  const zip=new JSZip();
  const folder=zip.folder("img");

  data.forEach(r=>{
    const base64=r.img.split(',')[1];
    folder.file(r.code+".jpg",base64,{base64:true});
  });

  let html="<h1>Album</h1>";

  data.forEach(r=>{
    html+=`<div><img src="img/${r.code}..code}</div>`;
  });

  zip.file("index.html",html);

  const blob=await zip.generateAsync({type:"blob"});

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="album.zip";
  a.click();
}

// ================= UI =================
function setStatus(msg){
  document.getElementById("status").textContent=msg;
}
</script>

</body>
</html>
