
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Scanner BDBCF</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

<style>
body {
  font-family: system-ui;
  background:#0f0f1a;
  color:#fff;
  text-align:center;
}

video { width:100%; }

button {
  width:90%;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
}

.primary { background:#00d2ff; }
.success { background:#00b894; }
.training { background:#fdcb6e; color:#000; }

</style>
</head>

<body>

<h2>🤖 AI Scanner BDBCF</h2>

<video id="video" playsinline muted></video>

<button class="primary" onclick="startCamera()">📸 Camera</button>
<button class="success" onclick="scan()">🔍 Scan</button>

<h3>🧠 Training</h3>
<div id="trainButtons"></div>

<p id="status">Pronto</p>

<script>
let video = document.getElementById("video");
let stream;

let classifier;
let modelReady = false;

const HEX = "0123456789ABCDEF".split("");

// ================= INIT AI =================
async function initAI(){
  classifier = knnClassifier.create();
  modelReady = true;

  // crea bottoni training
  const container = document.getElementById("trainButtons");

  HEX.forEach(ch => {
    let btn = document.createElement("button");
    btn.textContent = "Add " + ch;
    btn.className = "training";

    btn.onclick = () => addExample(ch);
    container.appendChild(btn);
  });
}

// ================= CAMERA =================
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  video.srcObject = stream;
  await video.play();

  if(!modelReady) await initAI();

  status("🟢 Camera attiva");
}

// ================= CAPTURE =================
function getCharImage(){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const w = video.videoWidth;
  const h = video.videoHeight;

  const cw = w * 0.7;
  const ch = h * 0.25;

  const x = (w-cw)/2;
  const y = (h-ch)/2;

  canvas.width = 64;
  canvas.height = 64;

  ctx.drawImage(video, x, y, cw, ch, 0, 0, 64, 64);

  return tf.browser.fromPixels(canvas)
           .mean(2)
           .expandDims(2)
           .toFloat()
           .div(255)
           .reshape([1,64,64,1]);
}

// ================= TRAINING =================
async function addExample(label){

  const img = getCharImage();

  classifier.addExample(img, label);

  status("✅ Training " + label);
}

// ================= SCAN =================
async function scan(){

  if(classifier.getNumClasses() === 0){
    alert("⚠️ Prima fai training!");
    return;
  }

  const img = getCharImage();

  const result = await classifier.predictClass(img);

  let predicted = result.label;

  // costruzione codice simulata (prefix fisso)
  let code = "BDBCF" + predicted.repeat(5);

  status("✅ " + code);
}

// ================= UI =================
function status(msg){
  document.getElementById("status").textContent = msg;
}
</script>

</body>
</html>
