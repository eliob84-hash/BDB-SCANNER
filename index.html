<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner BDBCF</title>

<!-- ✅ SCRIPT CORRETTI -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0f0f1a;
  color:#fff;
}

h3 { text-align:center; }

video { width:100%; background:black; }

.controls { text-align:center; }

input {
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button {
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00d2ff;
}

table {
  width:100%;
  font-size:0.85rem;
}

td {
  padding:6px;
  border-bottom:1px solid #333;
}

.thumb {
  width:70px;
  border-radius:6px;
}

.modified {
  color:#ff9800;
  font-weight:bold;
}

#version {
  font-size:0.7rem;
  opacity:0.7;
  text-align:center;
  margin-top:5px;
}
</style>
</head>

<body>

<h3>📷 Scanner BDBCF</h3>

<div class="controls">
  <input id="operator" placeholder="👤 Operatore">
  <input id="batch" placeholder="📦 Posizione (obbligatoria)">
</div>

<video id="video" playsinline muted></video>

<div class="controls">
  <button onclick="startCamera()">📸 Avvia</button>
  <button onclick="stopCamera()">⏹️ Stop</button>
</div>

<p id="status" style="text-align:center">Pronto</p>
<p style="text-align:center">Totale: <span id="count">0</span></p>

<table id="table"></table>

<div id="version"></div>

<script>
const video = document.getElementById("video");

let stream = null;
let worker = null;
let running = false;

let data = [];
let lastCode = "";

// ✅ VERSIONE TIMESTAMP
const VERSION = new Date().toISOString();
document.getElementById("version").textContent = "Versione: " + VERSION;

const REGEX = /^BDBCF00[0-9A-F]{3}$/;

// ================= CAMERA =================
async function startCamera(){

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    });

    video.srcObject = stream;
    await video.play();

    setStatus("✅ Camera attiva");

    startScanner();

  } catch(e){
    alert("Errore camera: " + e.message);
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    running = false;
    setStatus("⏹️ Stop");
  }
}

// ================= OCR =================
async function startScanner(){

  running = true;

  if(!worker){
    worker = await Tesseract.createWorker("eng");
  }

  scanLoop();
}

// ================= LOOP =================
async function scanLoop(){

  if(!running) return;

  try{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const w = video.videoWidth;
    const h = video.videoHeight;

    const cw = w * 0.6;
    const ch = h * 0.3;

    const x = (w - cw)/2;
    const y = (h - ch)/2;

    canvas.width = 600;
    canvas.height = 300;

    ctx.drawImage(video, x, y, cw, ch, 0, 0, 600, 300);

    const { data:{ text } } = await worker.recognize(canvas);

    processText(text, canvas);

  } catch(e){
    console.log(e);
  }

  setTimeout(scanLoop, 1200);
}

// ================= PARSE =================
function processText(text, canvas){

  // ✅ FIX OCR ERRORI
  let clean = text.toUpperCase()
    .replace(/O/g,"0")
    .replace(/I/g,"1")
    .replace(/[^A-Z0-9]/g,"");

  const matches = clean.match(/BDBCF00[0-9A-F]{3}/g) || [];

  matches.forEach(code=>{

    if(!REGEX.test(code)) return;

    if(code === lastCode) return;
    lastCode = code;

    if(data.some(d=>d.code === code)){
      feedbackError();
      setStatus("⚠️ Duplicato");
      return;
    }

    addRecord(code, canvas);
  });
}

// ================= ADD =================
function addRecord(code, canvas){

  // ✅ POSIZIONE OBBLIGATORIA
  const batch = document.getElementById("batch").value;
  if(!batch){
    setStatus("❌ Inserisci posizione!");
    feedbackError();
    return;
  }

  const record = {
    code,
    time: new Date().toLocaleTimeString(),
    op: document.getElementById("operator").value,
    batch,
    modified:false,
    img: canvas.toDataURL("image/jpeg")
  };

  data.push(record);
  render();

  feedbackOK();
}

// ================= TABLE =================
function render(){

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.slice().reverse().forEach((r,i)=>{

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>
        <img src="${r.img}" class="thumb" onclick="zoom('${rk="edit(${i})">${r.code}</span><br>
        ${r.time}
      </td>
      <td><button onclick="removeRow(${i})">🗑️</button></td>
    `;

    table.appendChild(row);
  });

  document.getElementById("count").textContent = data.length;
}

// ================= ACTIONS =================
function edit(i){

  let val = prompt("Modifica codice", data[i].code);
  if(!val) return;

  val = val.toUpperCase();

  if(!REGEX.test(val)){
    alert("Formato non valido");
    return;
  }

  data[i].code = val;
  data[i].modified = true;
  render();
}

function removeRow(i){
  if(confirm("Eliminare?")){
    data.splice(i,1);
    render();
  }
}

function zoom(src){
  window.open(src);
}

// ================= FEEDBACK =================
function feedbackOK(){
  beep(800);
  if(navigator.vibrate) navigator.vibrate(80);
}

function feedbackError(){
  beep(200);
  if(navigator.vibrate) navigator.vibrate(200);
}

function beep(freq){
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

// ================= UI =================
function setStatus(msg){
  document.getElementById("status").textContent = msg;
}
</script>

</body>
</html>
