<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Seriali OCR</title>

<!-- ✅ SCRIPT CORRETTO, UNICO, NON VISIBILE -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b0f14;
  color: white;
  padding: 10px;
}

h2 { text-align: center; }

.scanner {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
}

video {
  width: 100%;
  display: block;
}

.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.overlay::before {
  content: "";
  position: absolute;
  inset: 18% 12%;
  border: 2px solid rgba(0,255,0,.6);
  border-radius: 8px;
}

.scan-line {
  position: absolute;
  left: 12%;
  right: 12%;
  height: 3px;
  background: red;
  animation: scan 2.2s linear infinite;
}

@keyframes scan {
  0% { top: 18%; }
  50% { top: 82%; }
  100% { top: 18%; }
}

.controls {
  display: flex;
  gap: 8px;
  margin: 10px 0;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  background: #455a64;
  color: white;
}

table {
  width: 100%;
  margin-top: 10px;
  background: white;
  color: black;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

.thumb {
  width: 70px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>Scanner Seriali</h2>

<div class="scanner">
  <video id="video" autoplay playsinline></video>
  <div class="overlay">
    <div class="scan-line"></div>
  </div>
</div>

<div class="controls">
  <button onclick="toggleFlash()">Flash</button>
</div>

<table>
<thead>
<tr><th>Seriale</th><th>Miniatura</th></tr>
</thead>
<tbody id="results"></tbody>
</table>

<canvas id="canvas" hidden></canvas>

<script>
const SERIAL_REGEX = /^BDBCF00[0-9A-F]{3}$/;
const found = new Set();
let worker, track, flashOn = false;

const beep = new Audio(
  "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA="
);

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  track = stream.getVideoTracks()[0];

  worker = await Tesseract.createWorker();
  await worker.loadLanguage("eng");
  await worker.initialize("eng");

  scanLoop();
}

async function toggleFlash() {
  if (!track || !track.getCapabilities().torch) {
    alert("Flash non supportato");
    return;
  }
  flashOn = !flashOn;
  await track.applyConstraints({ advanced: [{ torch: flashOn }] });
}

async function scanLoop() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth / 2;
  canvas.height = video.videoHeight / 2;

  ctx.filter = "grayscale(100%) contrast(180%) brightness(110%)";
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const { data } = await worker.recognize(canvas);

  for (const w of data.words) {
    const t = w.text.replace(/O/g,"0").trim();
    if (!SERIAL_REGEX.test(t) || found.has(t)) continue;

    found.add(t);

    const { x0,y0,x1,y1 } = w.bbox;
    const c = document.createElement("canvas");
    c.width = x1-x0; c.height = y1-y0;
    c.getContext("2d").drawImage(canvas,x0,y0,c.width,c.height,0,0,c.width,c.height);

    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${t}</td><td><img class="thumb" src="${c.toDataURL()}"></td>`;
    results.appendChild(tr);

    beep.play();
    navigator.vibrate(200);
  }

  setTimeout(scanLoop, 1200);
}

start();
</script>

</body>
</html>
