
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner BDBCF</title>

<!-- ✅ SCRIPT CORRETTI -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.minrc="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.jstyle>
body {
  margin:0;
  font-family:system-ui;
  background:#111;
  color:#fff;
  text-align:center;
}

video { width:100%; }

.container { position:relative; }

.scan-box {
  position:absolute;
  left:15%;
  top:30%;
  width:70%;
  height:25%;
  border:2px dashed #00d2ff;
}

.scan-line {
  position:absolute;
  width:100%;
  height:2px;
  background:red;
  animation:scan 1.5s infinite;
}
@keyframes scan {
  0%{top:0}
  100%{top:100%}
}

button {
  width:90%;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:8px;
}

table {
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}
td,th {
  border-bottom:1px solid #333;
  padding:6px;
}
.thumb { width:50px; }
</style>
</head>

<body>

<h2>📷 Scanner BDBCF</h2>

<div class="container">
  <video id="video" playsinline muted></video>
  <div class="scan-box"><div class="scan-line"></div></div>
</div>

<button onclick="toggleCamera()">📸 Camera</button>
<button onclick="toggleFlash()">🔦 Flash</button>

<p id="status">Pronto</p>

<table>
<thead><tr><th>#</th><th>Codice</th><th>Ora</th><th>Img</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
// ================= VARIABILI =================
const video = document.getElementById("video");

let stream = null;
let track = null;
let flashOn = false;

let worker = null;
let scanning = false;

let data = [];
let id = 1;

// ================= CAMERA =================
async function toggleCamera(){

  try{
    if(stream){
      stream.getTracks().forEach(t=>t.stop());
      stream = null;
      scanning = false;
      setStatus("Camera OFF");
      return;
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" }
    });

    video.srcObject = stream;
    await video.play();

    track = stream.getVideoTracks()[0];

    worker = await Tesseract.createWorker("eng");

    scanning = true;
    loop();

    setStatus("Camera ON");

  } catch(e){
    alert("Errore: " + e.message);
  }
}

// ================= FLASH =================
async function toggleFlash(){

  if(!track) return;

  try{
    const cap = track.getCapabilities();

    if(!cap.torch){
      setStatus("Flash non supportato");
      return;
    }

    flashOn = !flashOn;

    await track.applyConstraints({
      advanced:[{ torch: flashOn }]
    });

    setStatus(flashOn ? "Flash ON" : "Flash OFF");

  } catch(e){
    setStatus("Errore flash");
  }
}

// ================= LOOP =================
async function loop(){
  if(!scanning) return;

  await scan();

  setTimeout(loop, 1200);
}

// ================= SCAN =================
async function scan(){

  if(video.readyState < 2) return;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const { data:{ text } } = await worker.recognize(canvas);

  process(text, canvas);
}

// ================= PROCESS =================
function process(text, canvas){

  let clean = text.toUpperCase()
    .replace(/O/g,"0")
    .replace(/I/g,"1")
    .replace(/[^A-Z0-9]/g,"");

  const match = clean.match(/BDBCF00[0-9A-F]{3}/);

  if(!match) return;

  const code = match[0];

  // ✅ evita duplicati
  if(data.some(d=>d.code === code)) return;

  const time = new Date().toLocaleTimeString();

  const img = canvas.toDataURL("image/jpeg",0.7);

  data.push({
    id:id++,
    code,
    time,
    img
  });

  render();

  setStatus("✅ " + code);
}

// ================= TABELLA =================
function render(){

  const tb = document.getElementById("tbody");
  tb.innerHTML = "";

  data.slice().reverse().forEach(r => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.id}</td>
      <td>${r.code}</td>
      <td>${r.time}</td>
      <td><img src="${r.img}" class="thumbendChild(tr);
  });
}

// ================= UI =================
function setStatus(msg){
  document.getElementById("status").textContent = msg;
}
</script>

</body>
</html>
