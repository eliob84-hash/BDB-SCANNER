<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Seriali OCR</title>

https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>
https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.jsscript>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #f4f6f8;
  padding: 12px;
}

h1 { text-align: center; }

.scanner {
  position: relative;
}

video {
  width: 100%;
  border-radius: 12px;
}

/* Barra rossa scanner */
.scan-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 3px;
  background: red;
  animation: scan 2.5s linear infinite;
}

@keyframes scan {
  0% { top: 10%; }
  50% { top: 85%; }
  100% { top: 10%; }
}

.controls {
  display: flex;
  gap: 8px;
  margin: 12px 0;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #0078d4;
  color: white;
}

.secondary {
  background: #666;
}

table {
  width: 100%;
  margin-top: 15px;
  background: white;
  border-collapse: collapse;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

.thumb {
  width: 70px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Scanner Seriali</h1>

<div class="scanner">
  <video id="video" autoplay playsinline></video>
  <div class="scan-line"></div>
</div>

<div class="controls">
  <button onclick="capture()">Scansiona</button>
  <button class="secondary" onclick="toggleFlash()">Flash</button>
  <button class="secondary" onclick="exportExcel()">Excel</button>
</div>

<table>
<thead>
<tr>
  <th>Seriale</th>
  <th>Immagine</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<canvas id="canvas" hidden></canvas>

<script>
let stream, track, flashOn = false;
const results = [];
const regex = /BDBCF00[0-9A-F]{3}/g;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
  track = stream.getVideoTracks()[0];
}

async function toggleFlash() {
  if (!track.getCapabilities().torch) {
    alert("Flash non supportato");
    return;
  }
  flashOn = !flashOn;
  await track.applyConstraints({ advanced: [{ torch: flashOn }] });
}

async function capture() {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg");

  const { data } = await Tesseract.recognize(image, "eng", {
    tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT
  });

  let text = data.text.replace(/O/g, "0");
  const matches = text.match(regex);
  if (!matches) return;

  data.words.forEach(word => {
    const clean = word.text.replace(/O/g, "0");
    if (!clean.match(regex)) return;

    if (results.find(r => r.serial === clean)) return;

    // Ritaglio bounding box
    const { x0, y0, x1, y1 } = word.bbox;
    const w = x1 - x0;
    const h = y1 - y0;

    const crop = document.createElement("canvas");
    crop.width = w;
    crop.height = h;
    crop.getContext("2d").drawImage(canvas, x0, y0, w, h, 0, 0, w, h);

    const thumb = crop.toDataURL("image/jpeg");

    results.push({ serial: clean, image: thumb });
    addRow(clean, thumb);
  });
}

function addRow(serial, img) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${serial}</td>
    <td><img class="thumb" src="${img}"></td>
  `;
  document.getElementById("results").appendChild(tr);
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(
    results.map(r => ({ Seriale: r.serial }))
  );
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Seriali");
  XLSX.writeFile(wb, "seriali.xlsx");
}

startCamera();
</script>

</body>
</html>
