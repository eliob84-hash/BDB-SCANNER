<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Scanner Test</title>

<!-- ✅ SCRIPT CORRETTI -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
body { font-family: system-ui; background:#111; color:white; padding:10px }
video { width:100%; border:2px solid #444 }
#log { margin-top:10px; font-size:14px }
</style>
</head>

<body>

<h2>Scanner OCR (test)</h2>

<video id="video" autoplay playsinline></video>
<div id="log">In attesa...</div>

<canvas id="canvas" hidden></canvas>

<script>
const SERIAL_REGEX = /^BDBCF00[0-9A-F]{3}$/;
let worker;
let scanning = false;

async function start() {
  // CAMERA
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);

  // OCR WORKER
  worker = await Tesseract.createWorker();
  await worker.loadLanguage("eng");
  await worker.initialize("eng");

  scanning = true;
  scanLoop();
}

async function scanLoop() {
  if (!scanning) return;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth / 2;
  canvas.height = video.videoHeight / 2;

  ctx.filter = "grayscale(100%) contrast(180%)";
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const { data } = await worker.recognize(canvas);

  for (const w of data.words) {
    const txt = w.text.replace(/O/g,"0").trim();
    if (SERIAL_REGEX.test(txt)) {
      document.getElementById("log").textContent =
        "TROVATO: " + txt;

      navigator.vibrate(200);
      break;
    }
  }

  setTimeout(scanLoop, 1200);
}

start();
</script>

</body>
</html>
