
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                
              </style>
                        </head>
                        <body>
                            

              <script>
                              const SHEET_NAME = 'Foglio1';
const DRIVE_FOLDER_ID = 'INCOLLA_QUI_IL_TUO_ID_CARTELLA_DRIVE';

function doGet(e) {
  return ContentService.createTextOutput(
    JSON.stringify({status:'ok', message:'Scanner API attiva'})
  ).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(SHEET_NAME);
    if (!sheet) return error('Foglio non trovato');
    
    const records = Array.isArray(data) ? data : [data];
    let added = 0;
    
    for (const r of records) {
      let imgUrl = '';
      
      // Upload immagine su Drive
      if (DRIVE_FOLDER_ID && r.imageData && r.serial) {
        try {
          const folder = DriveApp.getFolderById(DRIVE_FOLDER_ID);
          const b64 = r.imageData.split(',')[1] || r.imageData;
          const imgBytes = Utilities.base64Decode(b64);
          const blob = Utilities.newBlob(imgBytes, 'image/jpeg',
            r.serial + '_' + (r.id || Date.now()) + '.jpg');
          const file = folder.createFile(blob);
          file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
          // Usa il thumbnailLink che è un URL pubblico
          imgUrl = file.getDownloadUrl();
        } catch (imgErr) {
          imgUrl = 'ERR:' + imgErr.toString();
        }
      }
      
      const lastRow = sheet.getLastRow();
      sheet.appendRow([
        r.rowNum || lastRow + 1,
        r.timestamp || '',
        r.serial || '',
        r.confidence || '',
        r.corrections || '',
        r.modified || '',
        r.runNumber || '',
        r.pedana || '',
        r.operator || '',
        r.status || '',
        r.note || '',
        imgUrl
      ]);
      added++;
    }
    
    return success(added + ' record aggiunti');
  } catch (err) {
    return error(err.toString());
  }
}

function success(m) {
  return ContentService.createTextOutput(JSON.stringify({status:'success',message:m}))
    .setMimeType(ContentService.MimeType.JSON);
}

function error(m) {
  return ContentService.createTextOutput(JSON.stringify({status:'error',message:m}))
    .setMimeType(ContentService.MimeType.JSON);
}


              </script>
                        </body>
                        </html>
