<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Seriali OCR</title>

<!-- ✅ SCRIPT CORRETTO (NON MODIFICARE) -->
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.jsscript>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b0f14;
  color: white;
  padding: 10px;
}

h2 {
  text-align: center;
  margin-bottom: 8px;
}

.scanner {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,.6);
}

video {
  width: 100%;
  display: block;
}

/* Overlay area */
.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.overlay::before {
  content: "";
  position: absolute;
  inset: 15% 10%;
  border: 2px solid rgba(0,255,0,.6);
  border-radius: 8px;
}

/* Scan line */
.scan-line {
  position: absolute;
  left: 10%;
  right: 10%;
  height: 3px;
  background: red;
  animation: scan 2.2s linear infinite;
}

@keyframes scan {
  0% { top: 15%; }
  50% { top: 85%; }
  100% { top: 15%; }
}

.controls {
  display: flex;
  gap: 8px;
  margin: 10px 0;
}

button {
  flex: 1;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 10px;
  border: none;
}

.primary {
  background: #00e676;
  color: black;
}

.secondary {
  background: #455a64;
  color: white;
}

table {
  width: 100%;
  margin-top: 10px;
  background: white;
  color: black;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

.thumb {
  width: 75px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>Scanner Seriali</h2>

<div class="scanner">
  <video id="video" autoplay playsinline></video>
  <div class="overlay">
    <div class="scan-line"></div>
  </div>
</div>

<div class="controls">
  <button class="secondary" onclick="toggleFlash()">Flash</button>
</div>

<table>
<thead>
<tr>
  <th>Seriale</th>
  <th>Miniatura</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<canvas id="canvas" hidden></canvas>

<script>
const SERIAL_REGEX = /^BDBCF00[0-9A-F]{3}$/;

let worker;
let scanning = true;
let foundSerials = [];
let track;
let flashOn = false;

// beep
const beep = new Audio(
  "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA="
);

async function start() {
  // CAMERA
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);

  track = stream.getVideoTracks()[0];

  // OCR WORKER
  worker = await Tesseract.createWorker();
  await worker.loadLanguage("eng");
  await worker.initialize("eng");

  scanLoop();
}

async function toggleFlash() {
  if (!track?.getCapabilities().torch) {
    alert("Flash non supportato su questo dispositivo");
    return;
  }
  flashOn = !flashOn;
  await track.applyConstraints({ advanced: [{ torch: flashOn }] });
}

async function scanLoop() {
  if (!scanning) return;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth / 2;
  canvas.height = video.videoHeight / 2;

  // ✅ ottimizzato per plastica bianca
  ctx.filter = "grayscale(100%) contrast(180%) brightness(110%)";
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const { data } = await worker.recognize(canvas);

  for (const w of data.words) {
    const text = w.text.replace(/O/g,"0").trim();
    if (!SERIAL_REGEX.test(text)) continue;
    if (foundSerials.includes(text)) continue;

    foundSerials.push(text);

    const { x0,y0,x1,y1 } = w.bbox;
    const wdt = x1-x0, hgt = y1-y0;

    const crop = document.createElement("canvas");
    crop.width = wdt;
    crop.height = hgt;
    crop.getContext("2d")
      .drawImage(canvas, x0, y0, wdt, hgt, 0, 0, wdt, hgt);

    const thumb = crop.toDataURL("image/jpeg");
    addRow(text, thumb);

    beep.play();
    navigator.vibrate(200);
  }

  setTimeout(scanLoop, 1200);
}

function addRow(serial, img) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${serial}</td>
    <td><img class="thumb" src="${img}"></td>
  `;
  document.getElementById("results").appendChild(tr);
}

start();
</script>

</body>
</html>
